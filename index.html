<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>순공부시간 기록</title>
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <style>
    :root {
      --bg: #182232; 
      --surface: #24334a; 
      --surface-hover: #2f415e;
      --border: rgba(255, 255, 255, 0.05);
      --text: #f8fafc;
      --muted: #94a3b8;
      --primary: #3b82f6;
      --primary-glow: rgba(59, 130, 246, 0.4);
      --good: #10b981;
      --good-glow: rgba(16, 185, 129, 0.4);
      --warn: #f59e0b;
      --bad: #ef4444;
      --shadow: 0 15px 30px rgba(0,0,0,0.3), 0 5px 15px rgba(0,0,0,0.15);
      --radius: 16px; /* 둥글기도 살짝 줄임 */
    } 
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Pretendard', ui-sans-serif, system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .wrap {
      max-width: 1000px;
      margin: 0 auto;
      padding: 20px 16px; /* 상하 여백 축소 */
      display: flex;
      flex-direction: column;
      gap: 16px; /* 카드 간 간격 축소 */
      width: 100%;
    }
    .top {
      display: flex;
      gap: 16px; /* 상단 카드 간격 축소 */
      flex-wrap: wrap;
      align-items: stretch;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px; /* 카드 내부 여백 축소 */
      display: flex;
      flex-direction: column;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.35), 0 8px 16px rgba(0,0,0,0.2);
    }
    .card h1 {
      font-size: 18px; /* 타이틀 크기 살짝 축소 */
      margin: 0 0 12px 0;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    .muted { color: var(--muted); }
    
    /* Timer Display */
    .timer-display {
      font-size: 42px; /* 타이머 폰트 살짝 축소 */
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      text-align: center;
      margin: 4px 0 16px 0;
      letter-spacing: -1px;
    }
    .timer-display.active {
      color: var(--good);
      text-shadow: 0 0 20px var(--good-glow);
    }

    .btn {
      appearance: none;
      border: 1px solid rgba(255,255,255,0.05);
      background: rgba(255,255,255,0.05);
      color: var(--text);
      padding: 12px 14px; /* 버튼 높이 축소 */
      border-radius: 12px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
      width: 100%;
      text-align: center;
    }
    .btn:hover { transform: translateY(-1px); background: rgba(255,255,255,0.08); }
    .btn:active { transform: translateY(0px); }
    
    .btn.primary {
      border-color: var(--primary);
      background: var(--primary);
      color: #fff;
      font-size: 16px;
      padding: 14px;
      box-shadow: 0 6px 12px rgba(59, 130, 246, 0.2);
    }
    .btn.primary:hover {
      box-shadow: 0 8px 16px rgba(59, 130, 246, 0.35);
    }
    
    .btn.running {
      border-color: var(--good);
      background: var(--good);
      color: #fff;
      font-size: 16px;
      padding: 14px;
      animation: pulse-border 2s infinite;
    }

    @keyframes pulse-border {
      0% { box-shadow: 0 0 0 0 var(--good-glow); }
      70% { box-shadow: 0 0 0 12px rgba(16, 185, 129, 0); }
      100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
    }

    .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; justify-content: space-between; }
    .col { display: flex; flex-direction: column; gap: 6px; }
    .stat { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 8px;}
    
    .pill {
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(0,0,0,0.15);
      font-size: 12px;
      color: var(--muted);
      display: inline-flex;
      gap: 4px;
      align-items: center;
    }
    .pill b { color: var(--text); }
    .pill.good { border-color: var(--good); background: rgba(16, 185, 129, 0.08); color: var(--good); }
    .pill.warn { border-color: var(--warn); background: rgba(245, 158, 11, 0.08); color: var(--warn); }
    
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    
    @media (max-width: 768px){
      .grid { grid-template-columns: 1fr; }
      .wrap { padding: 12px; gap: 12px; }
      .top { gap: 12px; }
      .card { padding: 16px; }
      .timer-display { font-size: 36px; margin-bottom: 12px; }
    }

    /* Calendar */
    .cal-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .cal-title { display: flex; flex-direction: column; gap: 2px; }
    .cal-title .month { font-size: 16px; font-weight: 800; }
    .cal-title .avg { font-size: 12px; color: var(--muted); }
    .nav { display: flex; gap: 6px; }
    
    .iconbtn {
      width: 36px; height: 36px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.03);
      color: var(--text);
      cursor: pointer;
      font-size: 16px;
      transition: all 0.2s;
    }
    .iconbtn:hover { background: rgba(255,255,255,0.06); }
    
    .dow {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 6px;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
    }
    .dow div { text-align: center; }
    .days {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 6px;
    }
    .day {
      min-width: 0;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: rgba(0,0,0,0.1);
      min-height: 68px; /* 달력 높이 축소 */
      padding: 6px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      cursor: pointer;
      position: relative;
      transition: all 0.15s;
    }
    .day:hover { transform: translateY(-1px); background: rgba(255,255,255,0.05); }
    .day.out { opacity: 0.2; }
    .day .d { display: flex; justify-content: space-between; align-items: baseline; font-weight: 700; font-size: 13px;}
    .day .t { font-variant-numeric: tabular-nums; font-size: 12px; color: var(--primary); font-weight: 700; margin-top: auto;}
    .day.today { border-color: var(--primary); background: rgba(59, 130, 246, 0.08); }
    .day.selected { outline: 2px solid var(--good); outline-offset: -2px; }
    
    /* Sessions */
    .list { display: flex; flex-direction: column; gap: 10px; }
    .item {
      border: 1px solid var(--border);
      background: rgba(0,0,0,0.1);
      border-radius: 12px;
      padding: 12px;
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
    }
    .item .left { display: flex; flex-direction: column; gap: 2px; }
    .item .dur {
      font-variant-numeric: tabular-nums;
      font-weight: 800;
      font-size: 16px;
      color: var(--primary);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .item small { color: var(--muted); font-size: 11px; }
    
    .minirow { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
    .minirow .btn { width: auto; flex: 1; padding: 10px; font-size: 13px; }
    .danger { border-color: rgba(239, 68, 68, 0.3); color: var(--bad); }
    .danger:hover { background: rgba(239, 68, 68, 0.08); }
    
    .kbd {
      font-family: monospace;
      padding: 2px 4px;
      border-radius: 4px;
      background: rgba(255,255,255,0.05);
      color: var(--text);
      font-size: 11px;
    }
    .trash {
      background: transparent;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 16px;
      padding: 4px;
      transition: color 0.2s;
    }
    .trash:hover { color: var(--bad); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div class="card" style="flex: 1 1 360px;">
        <h1>순공부시간 기록</h1>
        
        <div class="timer-display" id="liveTimer">00:00:00</div>
        
        <div class="stat">
          <div class="pill">상태: <b id="statusText">대기</b></div>
          <div class="pill">시작: <b id="startText">-</b></div>
          <div class="pill" id="backupPill">백업: <b id="backupText">없음</b></div>
        </div>
        <div class="muted" style="font-size: 12px; margin-bottom: 12px;">
          단축키: <span class="kbd">Space</span> (앱을 꺼도 시간은 계속 계산돼요)
          <div id="backupHint" style="margin-top: 4px; color: var(--warn);"></div>
        </div>
        
        <button class="btn primary" id="toggleBtn">공부 시작</button>
        
        <div class="minirow">
          <button class="btn" id="exportBtn">백업</button>
          <button class="btn" id="importBtn">복원</button>
          <button class="btn danger" id="resetBtn">전체 초기화</button>
        </div>
        <input type="file" id="fileInput" accept="application/json" style="display:none;" />
      </div>

      <div class="card" style="flex: 1 1 250px;">
        <h1>요약</h1>
        <div class="list">
          <div class="item">
            <div class="left">
              <div><b id="sumMonth">이번 달</b></div>
              <small>월 누적</small>
            </div>
            <div class="dur" id="monthTotal">0:00</div>
          </div>
          <div class="item">
            <div class="left">
              <div><b>오늘</b></div>
              <small>오늘 누적</small>
            </div>
            <div class="dur" id="todayTotal">0:00</div>
          </div>
          <div class="item">
            <div class="left">
              <div><b id="selectedLabelText">선택한 날짜</b></div>
              <small>선택 누적</small>
            </div>
            <div class="dur" id="selectedTotal">0:00</div>
          </div>
        </div>
      </div>
    </div>

    <div class="grid">
      <div class="card">
        <div class="cal-head">
          <div class="cal-title">
            <div class="month" id="monthLabel">0000년 00월</div>
            <div class="avg">월 평균 공부시간: <b id="monthAvg">0:00</b></div>
          </div>
          <div class="nav">
            <button class="iconbtn" id="prevBtn" title="이전 달">‹</button>
            <button class="iconbtn" id="todayBtn" title="오늘로">●</button>
            <button class="iconbtn" id="nextBtn" title="다음 달">›</button>
          </div>
        </div>

        <div class="dow">
          <div>일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div>토</div>
        </div>
        <div class="days" id="days"></div>
      </div>

      <div class="card">
        <div class="row" style="margin-bottom: 12px;">
          <div class="col">
            <h1 style="margin: 0;">세션 목록</h1>
            <div class="muted" style="font-size: 12px;">선택한 날짜: <b id="selectedLabel" style="color:var(--text)">-</b></div>
          </div>
        </div>
        <div class="list" id="sessionList"></div>
      </div>
    </div>
  </div>

<script>
(() => {
  const LS_KEY = "study_sessions_v1";
  const RUN_KEY = "study_running_v1";
  const BACKUP_KEY = "study_last_backup_v1";

  let sessions = loadSessions();
  let runningStart = loadRunningStart(); 
  let lastBackup = loadLastBackup(); 
  let liveTimerInterval = null;

  let view = (() => {
    const now = new Date();
    return { y: now.getFullYear(), m: now.getMonth() };
  })();

  let selected = (() => {
    const now = new Date();
    return toDateKey(now);
  })();

  // ---------- helpers ----------
  function pad2(n){ return String(n).padStart(2,"0"); }
  function fmtHM(ms){
    ms = Math.max(0, ms|0);
    const totalMin = Math.floor(ms / 60000);
    const h = Math.floor(totalMin / 60);
    const m = totalMin % 60;
    return `${h}:${pad2(m)}`;
  }
  function fmtHMS(ms){
    ms = Math.max(0, ms|0);
    const totalSec = Math.floor(ms / 1000);
    const h = Math.floor(totalSec / 3600);
    const m = Math.floor((totalSec % 3600) / 60);
    const s = totalSec % 60;
    return `${pad2(h)}:${pad2(m)}:${pad2(s)}`;
  }
  function fmtDateTime(ts){
    const d = new Date(ts);
    const y = d.getFullYear();
    const m = pad2(d.getMonth()+1);
    const day = pad2(d.getDate());
    return `${y}-${m}-${day} ${pad2(d.getHours())}:${pad2(d.getMinutes())}`;
  }
  function toDateKey(d){
    const y = d.getFullYear();
    const m = pad2(d.getMonth()+1);
    const day = pad2(d.getDate());
    return `${y}-${m}-${day}`;
  }
  function dateKeyToDate(key){
    const [y,m,d] = key.split("-").map(Number);
    return new Date(y, m-1, d);
  }
  function isSameMonth(aKey, y, m){
    const d = dateKeyToDate(aKey);
    return d.getFullYear()===y && d.getMonth()===m;
  }
  function daysInMonth(y,m){ return new Date(y, m+1, 0).getDate(); }
  function clamp(n,min,max){ return Math.max(min, Math.min(max,n)); }
  function daysSince(ts){
    if(!ts) return null;
    const ms = Date.now() - ts;
    return Math.floor(ms / (24*60*60*1000));
  }
  function uid(){
    return `${Date.now().toString(36)}-${Math.random().toString(36).slice(2,8)}`;
  }

  // ---------- storage ----------
  function loadSessions(){
    try {
      const raw = localStorage.getItem(LS_KEY);
      if(!raw) return [];
      const arr = JSON.parse(raw);
      if(!Array.isArray(arr)) return [];
      return arr
        .filter(x => x && typeof x.start==="number" && typeof x.end==="number" && typeof x.ms==="number")
        .map(x => ({ id: (typeof x.id==="string" ? x.id : uid()), start:x.start, end:x.end, ms:x.ms }))
        .sort((a,b)=>a.start-b.start);
    } catch { return []; }
  }
  function saveSessions(){ localStorage.setItem(LS_KEY, JSON.stringify(sessions)); }

  function loadRunningStart(){
    const raw = localStorage.getItem(RUN_KEY);
    if(!raw) return null;
    const n = Number(raw);
    return Number.isFinite(n) ? n : null;
  }
  function saveRunningStart(n){
    if(n==null) localStorage.removeItem(RUN_KEY);
    else localStorage.setItem(RUN_KEY, String(n));
  }

  function loadLastBackup(){
    const raw = localStorage.getItem(BACKUP_KEY);
    if(!raw) return null;
    const n = Number(raw);
    return Number.isFinite(n) ? n : null;
  }
  function saveLastBackup(ts){
    if(ts==null){
      localStorage.removeItem(BACKUP_KEY);
      lastBackup = null;
    }else{
      localStorage.setItem(BACKUP_KEY, String(ts));
      lastBackup = ts;
    }
  }

  function splitByMidnight(start, end){
    const out = [];
    let cur = start;
    while(cur < end){
      const d = new Date(cur);
      const nextMidnight = new Date(d.getFullYear(), d.getMonth(), d.getDate()+1).getTime();
      const cut = Math.min(end, nextMidnight);
      out.push({ start: cur, end: cut, ms: cut - cur });
      cur = cut;
    }
    return out;
  }

  function buildDailyTotals(){
    const map = new Map();
    for(const s of sessions){
      const k = toDateKey(new Date(s.start));
      map.set(k, (map.get(k)||0) + s.ms);
    }
    return map;
  }

  function getSessionsForDateKey(key){
    const start = dateKeyToDate(key).getTime();
    const end = dateKeyToDate(key);
    end.setDate(end.getDate()+1);
    const endTs = end.getTime();
    return sessions.filter(s => s.start >= start && s.start < endTs);
  }

  // ---------- UI refs ----------
  const statusText = document.getElementById("statusText");
  const startText = document.getElementById("startText");
  const toggleBtn = document.getElementById("toggleBtn");
  const liveTimer = document.getElementById("liveTimer");

  const monthLabel = document.getElementById("monthLabel");
  const monthAvg = document.getElementById("monthAvg");
  const daysEl = document.getElementById("days");

  const prevBtn = document.getElementById("prevBtn");
  const nextBtn = document.getElementById("nextBtn");
  const todayBtn = document.getElementById("todayBtn");

  const monthTotal = document.getElementById("monthTotal");
  const todayTotal = document.getElementById("todayTotal");
  const selectedTotal = document.getElementById("selectedTotal");

  const selectedLabel = document.getElementById("selectedLabel");
  const selectedLabelText = document.getElementById("selectedLabelText");
  const sessionList = document.getElementById("sessionList");

  const exportBtn = document.getElementById("exportBtn");
  const importBtn = document.getElementById("importBtn");
  const resetBtn = document.getElementById("resetBtn");
  const fileInput = document.getElementById("fileInput");

  const backupPill = document.getElementById("backupPill");
  const backupText = document.getElementById("backupText");
  const backupHint = document.getElementById("backupHint");

  // ---------- actions ----------
  function updateLiveTimer() {
    if (runningStart == null) {
      liveTimer.textContent = "00:00:00";
      liveTimer.classList.remove("active");
      return;
    }
    const elapsed = Date.now() - runningStart;
    liveTimer.textContent = fmtHMS(elapsed);
    liveTimer.classList.add("active");
  }

  function startStudy(){
    if(runningStart != null) return;
    runningStart = Date.now();
    saveRunningStart(runningStart);
    
    liveTimerInterval = setInterval(updateLiveTimer, 1000);
    renderAll();
  }

  function stopStudy(){
    if(runningStart == null) return;
    const start = runningStart;
    const end = Date.now();

    runningStart = null;
    saveRunningStart(null);
    clearInterval(liveTimerInterval);
    updateLiveTimer();

    if(end <= start + 2000){ // 2초 미만은 기록 안 함
      renderAll();
      return;
    }

    const parts = splitByMidnight(start, end);
    for(const p of parts) {
      sessions.push({ id: uid(), ...p });
    }
    sessions.sort((a,b)=>a.start-b.start);
    saveSessions();

    selected = toDateKey(new Date(end));
    view = { y: new Date(end).getFullYear(), m: new Date(end).getMonth() };

    renderAll();
  }

  function toggleStudy(){
    if(runningStart == null) startStudy();
    else stopStudy();
  }

  function deleteSessionById(id){
    const idx = sessions.findIndex(s => s.id === id);
    if(idx < 0) return;
    if(!confirm("이 기록을 삭제할까요?")) return;

    sessions.splice(idx, 1);
    saveSessions();
    renderAll();
  }

  function setViewMonth(y,m){
    view.y = y; view.m = clamp(m,0,11);
    renderAll();
  }

  function goToday(){
    const now = new Date();
    view = { y: now.getFullYear(), m: now.getMonth() };
    selected = toDateKey(now);
    renderAll();
  }

  function onSelectDate(key){
    selected = key;
    const d = dateKeyToDate(key);
    view = { y: d.getFullYear(), m: d.getMonth() };
    renderAll();
  }

  function exportJSON(){
    const payload = {
      version: 2,
      exportedAt: Date.now(),
      sessions,
      runningStart
    };
    const blob = new Blob([JSON.stringify(payload, null, 2)], {type:"application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `study-sessions-${new Date().toISOString().slice(0,10)}.json`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);

    saveLastBackup(Date.now());
    renderBackup();
  }

  function importJSONFile(file){
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const obj = JSON.parse(String(reader.result||""));
        if(!obj || !Array.isArray(obj.sessions)) throw new Error("bad format");
        const imported = obj.sessions
          .filter(x => x && typeof x.start==="number" && typeof x.end==="number" && typeof x.ms==="number")
          .map(x => ({ id: (typeof x.id==="string" ? x.id : uid()), start:x.start, end:x.end, ms:x.ms }));

        sessions = imported.sort((a,b)=>a.start-b.start);
        saveSessions();

        runningStart = null;
        saveRunningStart(null);
        clearInterval(liveTimerInterval);

        renderAll();
        alert("성공적으로 복원했습니다!");
      } catch {
        alert("복원 실패: 올바른 백업 파일이 아닙니다.");
      }
    };
    reader.readAsText(file);
  }

  function resetAll(){
    if(!confirm("⚠️ 진짜로 모든 기록을 삭제할까요? 이 작업은 되돌릴 수 없습니다.")) return;
    sessions = [];
    runningStart = null;
    clearInterval(liveTimerInterval);
    
    localStorage.removeItem(LS_KEY);
    localStorage.removeItem(RUN_KEY);
    localStorage.removeItem(BACKUP_KEY);
    lastBackup = null;
    renderAll();
  }

  // ---------- render ----------
  function renderTop(){
    updateLiveTimer();
    if(runningStart == null){
      statusText.textContent = "대기중";
      statusText.style.color = "var(--muted)";
      toggleBtn.textContent = "▶ 공부 시작하기";
      toggleBtn.classList.remove("running");
      toggleBtn.classList.add("primary");
      startText.textContent = "-";
    }else{
      statusText.textContent = "공부중!";
      statusText.style.color = "var(--good)";
      toggleBtn.textContent = "■ 공부 종료 및 기록 저장";
      toggleBtn.classList.add("running");
      toggleBtn.classList.remove("primary");
      startText.textContent = fmtDateTime(runningStart).slice(11);
    }
  }

  function renderBackup(){
    const d = daysSince(lastBackup);
    backupPill.classList.remove("warn","good");

    if(lastBackup == null){
      backupText.textContent = "기록 없음";
      backupPill.classList.add("warn");
      backupHint.textContent = "백업 기록이 없어요. 소중한 기록을 위해 '백업' 버튼을 눌러주세요.";
      return;
    }

    const age = d ?? 0;
    backupText.textContent = `${age === 0 ? '오늘' : age + '일 전'} 백업됨`;

    if(age >= 7){
      backupPill.classList.add("warn");
      backupHint.textContent = `마지막 백업이 ${age}일 전이에요. 안전을 위해 백업을 권장해요.`;
    }else{
      backupPill.classList.add("good");
      backupHint.textContent = "";
    }
  }

  function renderCalendar(){
    const y = view.y, m = view.m;
    monthLabel.textContent = `${y}년 ${m+1}월`;

    const totals = buildDailyTotals();
    const first = new Date(y,m,1);
    const firstDow = first.getDay();
    const dim = daysInMonth(y,m);
    const prevDim = daysInMonth(y, m-1 < 0 ? 11 : m-1);
    const cells = [];

    for(let i=0;i<42;i++){
      const dayNum = i - firstDow + 1;
      let cellDate, out=false;

      if(dayNum < 1){
        const pm = (m-1+12)%12;
        const py = m===0 ? y-1 : y;
        cellDate = new Date(py, pm, prevDim + dayNum);
        out = true;
      }else if(dayNum > dim){
        const nm = (m+1)%12;
        const ny = m===11 ? y+1 : y;
        cellDate = new Date(ny, nm, dayNum - dim);
        out = true;
      }else{
        cellDate = new Date(y,m,dayNum);
      }

      const key = toDateKey(cellDate);
      const ms = totals.get(key) || 0;
      cells.push({ key, date: cellDate, out, ms });
    }

    let monthSum = 0;
    for(const [k,ms] of totals.entries()){
      if(isSameMonth(k, y, m)) monthSum += ms;
    }
    monthAvg.textContent = fmtHM(Math.floor(monthSum / dim));

    daysEl.innerHTML = "";
    const todayKey = toDateKey(new Date());

    for(const c of cells){
      const el = document.createElement("div");
      el.className = "day" + (c.out ? " out" : "");
      if(c.key === todayKey) el.classList.add("today");
      if(c.key === selected) el.classList.add("selected");

      el.innerHTML = `
        <div class="d">
          <div>${c.date.getDate()}</div>
        </div>
        <div class="t">${c.ms > 0 ? fmtHM(c.ms) : ""}</div>
      `;
      el.addEventListener("click", () => onSelectDate(c.key));
      daysEl.appendChild(el);
    }
  }

  function renderSummary(){
    const totals = buildDailyTotals();
    const todayKey = toDateKey(new Date());

    let monthSum = 0;
    for(const [k,ms] of totals.entries()){
      if(isSameMonth(k, view.y, view.m)) monthSum += ms;
    }
    monthTotal.textContent = fmtHM(monthSum);
    todayTotal.textContent = fmtHM(totals.get(todayKey) || 0);
    selectedTotal.textContent = fmtHM(totals.get(selected) || 0);

    selectedLabel.textContent = selected;
    selectedLabelText.textContent = selected.slice(5).replace('-','월 ') + '일';
    document.getElementById("sumMonth").textContent = `${view.y}년 ${view.m+1}월`;
  }

  function renderSessions(){
    const list = getSessionsForDateKey(selected);
    sessionList.innerHTML = "";

    if(list.length === 0){
      sessionList.innerHTML = `<div class="muted" style="text-align:center; padding: 20px;">이 날의 공부 기록이 없어요.</div>`;
      return;
    }

    const reversed = [...list].sort((a,b)=>b.start-a.start);

    for(const s of reversed){
      const item = document.createElement("div");
      item.className = "item";
      item.innerHTML = `
        <div class="left">
          <div><b>${fmtDateTime(s.start).slice(11)}</b> ~ <b>${fmtDateTime(s.end).slice(11)}</b></div>
        </div>
        <div class="dur">
          <span>${fmtHMS(s.ms)}</span>
          <button class="trash" title="삭제">🗑</button>
        </div>
      `;

      item.querySelector(".trash").addEventListener("click", (e) => {
        e.stopPropagation();
        deleteSessionById(s.id);
      });
      sessionList.appendChild(item);
    }
  }

  function renderAll(){
    renderTop();
    renderBackup();
    renderCalendar();
    renderSummary();
    renderSessions();
  }

  // ---------- wire up ----------
  toggleBtn.addEventListener("click", toggleStudy);
  prevBtn.addEventListener("click", () => {
    let y=view.y, m=view.m-1;
    if(m<0){ m=11; y--; }
    setViewMonth(y,m);
  });
  nextBtn.addEventListener("click", () => {
    let y=view.y, m=view.m+1;
    if(m>11){ m=0; y++; }
    setViewMonth(y,m);
  });
  todayBtn.addEventListener("click", goToday);

  exportBtn.addEventListener("click", exportJSON);
  importBtn.addEventListener("click", () => fileInput.click());
  fileInput.addEventListener("change", (e) => {
    const f = e.target.files && e.target.files[0];
    if(f) importJSONFile(f);
    fileInput.value = "";
  });
  resetBtn.addEventListener("click", resetAll);

  window.addEventListener("keydown", (e) => {
    if(e.code === "Space"){
      const tag = (document.activeElement && document.activeElement.tagName) || "";
      if(tag === "INPUT" || tag === "TEXTAREA" || tag === "BUTTON") return;
      e.preventDefault();
      toggleStudy();
    }
  });

  // initial setup
  if(runningStart != null) {
    liveTimerInterval = setInterval(updateLiveTimer, 1000);
  }
  renderAll();
})();
</script>
</body>
</html>
